<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Recording bank account transactions manually — LedgerZero</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #f7f7f7;
        margin: 0;
      }
      .box {
        max-width: 480px;
        margin: 8vh auto;
        padding: 24px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      form label {
        display: block;
        margin-top: 12px;
        font-size: 14px;
        color: #333;
      }
      form input, form select {
        display: block;
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        margin-top: 4px;
        font-size: 14px;
      }
      button {
        margin-top: 16px;
        padding: 8px 16px;
        cursor: pointer;
      }
      .muted {
        color: #666;
        font-size: 13px;
      }
      .error {
        color: #a00;
      }
      .success {
        color: #060;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="react.production.min.js"></script>
    <script src="react-dom.production.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
